# =============================================================================
# GitLab CI/CD Configuration
# =============================================================================
# Pipelines:
#   1. Feature Merge Pipeline  - Runs on merge requests (feature_merge_*)
#   2. Feature Branch Pipeline - Runs on feature branches when RUN_FEATURE_PIPELINE=true (feature_*)
#   3. Prerelease Pipeline     - Runs on main branch commits (prerelease_*)
#   4. Release Pipeline        - Manually triggered on main branch (release_*)
#   5. Cornerstone Pipeline    - Manually triggered on main for distribution builds (cornerstone_*)
# =============================================================================

workflow:
  auto_cancel:
    on_new_commit: interruptible

stages:
  - base_image
  - prebuild
  - build
  - test
  - analyze
  - package
  - prerelease_publish
  - pre_release
  - release_publish
  - post_release

variables:
  VERSION_BUMP_LEVEL: minor
  RELEASE_TYPE: release
  GIT_SUBMODULE_STRATEGY: recursive
  BASE_IMAGE_TAG: '${CI_REGISTRY_IMAGE}:base-${CI_COMMIT_SHORT_SHA}'
  # Set to 'true' to run the non-merge feature pipeline (build/test/package/publish on feature branches).
  # When 'true', the merge request pipeline is skipped, which blocks merging to main.
  # Set back to 'false' (or remove override) to re-enable the merge pipeline before merging.
  RUN_FEATURE_PIPELINE: 'false'
  # Set to 'true' to run all jobs against every package (lint, test, sonar, etc.)
  # instead of only affected/changed packages. The pre-merge gate will block merge
  # while this is set, so remember to set it back to 'false' before merging.
  MERGE_PIPELINE_RUN_ALL: 'false'
  # Helper container memory/ephemeral for large cache operations (~2.3GB workspace
  # cache). Default 256Mi OOMs during cache upload/download. These apply globally
  # since all jobs share the same cache size regardless of build-container sizing.
  KUBERNETES_HELPER_MEMORY_REQUEST: 2Gi
  KUBERNETES_HELPER_MEMORY_LIMIT: 2Gi
  KUBERNETES_HELPER_EPHEMERAL_STORAGE_REQUEST: 4Gi
  # Kiro review agent defaults. Model is pinned (not 'auto') so the same model
  # assesses every run, avoiding finding variance from auto-routing. High effort
  # produces more thorough, consistent assessments. Override per-job if needed.
  KIRO_MODEL: 'claude-opus-4.8'
  KIRO_EFFORT: 'high'
  KIRO_TIMEOUT: '600'

image: ${BASE_IMAGE_TAG}

before_script:
  # Helper container clones the repo as root; reclaim ownership for pipelineuser (UID 1001)
  # so npm ci / chmod / git operations don't hit EPERM. sudo is scoped to /bin/chown only.
  - sudo chown -R 1001:1001 "$CI_PROJECT_DIR"
  - git config advice.addIgnoredFile false
  - git config --global user.name "CICD"
  - git config --global user.email "ci@example.com"

# =============================================================================
# Shared Templates
# =============================================================================

# -----------------------------------------------------------------------------
# T-Shirt Size Templates
# -----------------------------------------------------------------------------
# The shared runner fleet runs on Amazon EKS Auto Mode. Compute and memory are
# requested per-job via KUBERNETES_* CI/CD variables rather than size:X tags.
# The templates below roughly re-create the previous T-shirt sizing. Each job
# extends the appropriate template. For a given job, REQUEST and LIMIT are set
# to the same value so a job that requests more than the default limit is not
# rejected (default CPU limit = 1, default memory limit = 1Gi). Ephemeral
# storage requests the amount needed to be scheduled on a suitable node;
# Kubernetes manages the limit automatically (max request is 200Gi).
#
# Size    CPU  Memory  Ephemeral
# small    1     2Gi     1Gi
# medium   2     4Gi     4Gi
# large    4     8Gi     8Gi
# xlarge   8    16Gi    16Gi
# 2xlarge 16    32Gi    32Gi
# 3xlarge 32    64Gi    64Gi  (max CPU = 32, max memory = 64Gi)
# -----------------------------------------------------------------------------

.size_small:
  variables:
    KUBERNETES_CPU_REQUEST: '1'
    KUBERNETES_CPU_LIMIT: '1'
    KUBERNETES_MEMORY_REQUEST: 2Gi
    KUBERNETES_MEMORY_LIMIT: 2Gi
    KUBERNETES_EPHEMERAL_STORAGE_REQUEST: 1Gi

.size_medium:
  variables:
    KUBERNETES_CPU_REQUEST: '2'
    KUBERNETES_CPU_LIMIT: '2'
    KUBERNETES_MEMORY_REQUEST: 4Gi
    KUBERNETES_MEMORY_LIMIT: 4Gi
    KUBERNETES_EPHEMERAL_STORAGE_REQUEST: 4Gi

.size_large:
  variables:
    KUBERNETES_CPU_REQUEST: '4'
    KUBERNETES_CPU_LIMIT: '4'
    KUBERNETES_MEMORY_REQUEST: 8Gi
    KUBERNETES_MEMORY_LIMIT: 8Gi
    KUBERNETES_EPHEMERAL_STORAGE_REQUEST: 8Gi

.size_xlarge:
  variables:
    KUBERNETES_CPU_REQUEST: '8'
    KUBERNETES_CPU_LIMIT: '8'
    KUBERNETES_MEMORY_REQUEST: 16Gi
    KUBERNETES_MEMORY_LIMIT: 16Gi
    KUBERNETES_EPHEMERAL_STORAGE_REQUEST: 16Gi

.size_2xlarge:
  variables:
    KUBERNETES_CPU_REQUEST: '16'
    KUBERNETES_CPU_LIMIT: '16'
    KUBERNETES_MEMORY_REQUEST: 32Gi
    KUBERNETES_MEMORY_LIMIT: 32Gi
    KUBERNETES_EPHEMERAL_STORAGE_REQUEST: 32Gi

.size_3xlarge:
  variables:
    KUBERNETES_CPU_REQUEST: '32'
    KUBERNETES_CPU_LIMIT: '32'
    KUBERNETES_MEMORY_REQUEST: 64Gi
    KUBERNETES_MEMORY_LIMIT: 64Gi
    KUBERNETES_EPHEMERAL_STORAGE_REQUEST: 64Gi

# -----------------------------------------------------------------------------
# Retry on infrastructure failure (merge-pipeline jobs)
# -----------------------------------------------------------------------------
# Merge-pipeline jobs are idempotent (fresh checkout + build/test from scratch),
# so re-running on a transient fleet failure is safe. Retry up to 2 times (the
# GitLab maximum) on infra failures only. We deliberately do NOT retry on
# script_failure: a genuine test/build failure must fail immediately and loudly.
.retry_on_infra_failure:
  retry:
    max: 2
    when:
      - runner_system_failure # helper container evicted, pod terminated, runner OOM
      - stuck_or_timeout_failure # job stuck waiting for a runner to pick it up
      - api_failure # GitLab API hiccup during job orchestration
      - scheduler_failure # GitLab couldn't schedule the job onto a runner

# Template: Kaniko-based Docker image build
.base_image_template:
  extends: .size_2xlarge
  stage: base_image
  tags:
    - arch:amd64
  cache: {} # This disables cache for this job
  before_script: [] # Disable global before_script
  image:
    name: ${MDAA_BASE_IMAGE}
    entrypoint: ['']
  script:
    # This unreadable echo command is recommended in kaniko docs: https://docs.gitlab.com/ee/ci/docker/using_kaniko.html
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"},\"$(echo -n $CI_DEPENDENCY_PROXY_SERVER | awk -F[:] '{print $1}')\":{\"auth\":\"$(printf "%s:%s" ${CI_DEPENDENCY_PROXY_USER} "${CI_DEPENDENCY_PROXY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/.pipeline/Dockerfile"
      --destination "${BASE_IMAGE_TAG}"
      --cache=true --cache-repo="${CI_REGISTRY_IMAGE}/cache" --cleanup --cache-ttl 72h0m0s

# =============================================================================
# Pipeline 1: Feature Merge Pipeline (merge requests)
# =============================================================================
# Triggered on merge request events. Validates, builds, tests, and analyzes
# changes before they are merged to main.
# Stage order: base_image -> prebuild -> build -> test -> analyze
# =============================================================================

# Build the base Docker image for merge request pipelines
feature_merge_base_image:
  extends:
    - .base_image_template
    - .retry_on_infra_failure
  interruptible: true
  only:
    - merge_requests

# --- prebuild stage ---

# Validate package configurations
feature_validate_packages:
  extends: .size_medium
  interruptible: true
  tags:
    - arch:amd64
  only:
    - merge_requests
  stage: prebuild
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
    AWS_DEFAULT_REGION: us-east-1
  script:
    - ./scripts/quality/validate_packages.sh

# Lint TypeScript/JavaScript source
feature_merge_lint:
  extends:
    - .size_large
    - .retry_on_infra_failure
  interruptible: true
  tags:
    - arch:amd64
  only:
    - merge_requests
  stage: prebuild
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
    AWS_DEFAULT_REGION: us-east-1
    GIT_DEPTH: '0'
  script:
    - echo "Running npm_install_repo.sh script"
    - ./scripts/build/npm_install_repo.sh
    - echo "Completed npm_install_repo.sh"
    - echo "Executing npm run lint"
    - npm run lint

# Lint Python source
feature_merge_lint_python:
  extends:
    - .size_medium
    - .retry_on_infra_failure
  interruptible: true
  tags:
    - arch:amd64
  only:
    - merge_requests
  stage: prebuild
  allow_failure: false
  script:
    - ./scripts/quality/lint_python.sh

# Verify the feature branch is up to date with the target branch before proceeding.
# Runs independently (needs: []) so it doesn't block the build stage.
# If it fails the pipeline fails and the MR cannot merge.
feature_check_target:
  extends: .size_medium
  interruptible: true
  image:
    name: alpine/git:latest
    entrypoint: ['']
  tags:
    - arch:amd64
  only:
    - merge_requests
  stage: prebuild
  needs: []
  before_script: []
  allow_failure: false
  variables:
    GIT_DEPTH: '0'
  script:
    - sh ./scripts/ci/check_target.sh

# Scan for accidentally committed secrets
feature_merge_git_secrets:
  extends:
    - .size_small
    - .retry_on_infra_failure
  interruptible: true
  tags:
    - arch:amd64
  only:
    - merge_requests
  stage: prebuild
  allow_failure: false
  script:
    - ./scripts/quality/git_secrets.sh

# --- build stage ---

# Validate dependency tree after merge
feature_validate_dependencies:
  extends: .size_medium
  interruptible: true
  tags:
    - arch:amd64
  only:
    - merge_requests
  stage: build
  dependencies: []
  needs:
    - feature_merge_base_image
  script:
    - ./scripts/quality/validate_dependencies.sh

# Build and run TypeScript/JavaScript tests
feature_merge_build_test:
  extends:
    - .size_3xlarge
    - .retry_on_infra_failure
  interruptible: true
  tags:
    - arch:amd64
  only:
    - merge_requests
  stage: build
  dependencies: []
  needs:
    - feature_merge_base_image
  cache:
    key: feature-merge-build-$CI_COMMIT_REF_SLUG
    paths:
      - node_modules/
      - packages/**/node_modules/
      - .nx/
    policy: pull-push
  artifacts:
    untracked: false
    paths:
      - '*'
    exclude:
      - '**/node_modules/**'
      - '.nx/**'
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
    AWS_DEFAULT_REGION: us-east-1
    GIT_DEPTH: '0'
    LERNA_CONCURRENCY: '8'
    NODE_OPTIONS: '--max-old-space-size=3072'
  script:
    - ./scripts/build/npm_install_repo.sh
    - npm run build
    - ./scripts/ci/check_schema_drift.sh
    - ./scripts/ci/check_agent_rules_drift.sh
    - npm run test
    # Remove nx daemon log before cache save (~157MB of no CI value)
    - rm -rf .nx/workspace-data/d/

# Run Python tests (after build_test to reuse node_modules cache)
feature_merge_python_test:
  extends:
    - .size_large
    - .retry_on_infra_failure
  interruptible: true
  stage: test
  tags:
    - arch:amd64
  only:
    - merge_requests
  dependencies:
    - feature_merge_build_test
  needs:
    - feature_merge_build_test
  cache:
    - key: feature-merge-build-$CI_COMMIT_REF_SLUG
      paths:
        - node_modules/
        - packages/**/node_modules/
        - .nx/
      policy: pull
    - key: feature-merge-python-v2-$CI_COMMIT_REF_SLUG
      paths:
        - .uv-cache/
        - '**/python-tests/uv.lock'
      policy: pull-push
  variables:
    UV_CACHE_DIR: ${CI_PROJECT_DIR}/.uv-cache
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: '**/python-tests/coverage.xml'
    paths:
      - '**/python-tests/coverage.xml'
      - '**/python-tests/htmlcov/'
    expire_in: 1 week
  script:
    - echo "Running Python tests with coverage..."
    - npm run test:python

# Generate a child pipeline with one job per starter kit (dynamic, derived from
# the kit directories — no hand-maintained job list). The generator is fast
# (just enumerates kits); the actual synth runs in the triggered child pipeline.
feature_merge_starter_kit_generate:
  extends:
    - .size_small
    - .retry_on_infra_failure
  interruptible: true
  stage: test
  tags:
    - arch:amd64
  only:
    - merge_requests
  dependencies:
    - feature_merge_build_test
  needs:
    - feature_merge_build_test
  cache:
    key: feature-merge-build-$CI_COMMIT_REF_SLUG
    paths:
      - node_modules/
      - packages/**/node_modules/
      - .nx/
    policy: pull
  allow_failure: false
  variables:
    GIT_DEPTH: '0'
  script:
    - python3 ./scripts/ci/generate_starter_kit_jobs.py > starter-kit-pipeline.yml
    - echo "Generated child pipeline:"
    - cat starter-kit-pipeline.yml
  artifacts:
    paths:
      - starter-kit-pipeline.yml
    expire_in: 1 day

# Trigger the generated child pipeline. strategy:depend makes this job (and thus
# the MR) reflect the child pipeline's aggregate pass/fail. The child jobs pull
# the built workspace from the shared feature-merge-build cache.
# NOTE: trigger jobs do not support `retry` (or most normal job keys); the child
# jobs carry their own retry instead.
feature_merge_starter_kit_test:
  stage: test
  only:
    - merge_requests
  needs:
    - feature_merge_starter_kit_generate
  trigger:
    include:
      - artifact: starter-kit-pipeline.yml
        job: feature_merge_starter_kit_generate
    strategy: depend

# --- test stage ---

# Validate package-level documentation for changed packages
feature_merge_test_package_docs:
  extends:
    - .size_medium
    - .retry_on_infra_failure
  interruptible: true
  tags:
    - arch:amd64
  only:
    - merge_requests
  stage: test
  dependencies:
    - feature_merge_build_test
  needs:
    - feature_merge_build_test
  cache:
    key: feature-merge-build-$CI_COMMIT_REF_SLUG
    paths:
      - node_modules/
      - packages/**/node_modules/
      - .nx/
    policy: pull
  allow_failure: false
  variables:
    GIT_DEPTH: '0'
  script:
    - ./scripts/generate_docs/test_package_docs_repo.sh

# =============================================================================
# GitLab Pages (serves docs directly from this repo)
# =============================================================================

pages:
  extends: .size_medium
  interruptible: false
  tags:
    - arch:amd64
  only:
    refs:
      - main
  except:
    variables:
      - $GITLAB_USER_NAME == "CI_GROUP_TOKEN"
    refs:
      - tags
  stage: prerelease_publish
  pages:
    publish: internal
  cache:
    key: prerelease-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
      - .nx/
    policy: pull
  needs:
    - prerelease_version
    - prerelease_analyze
  dependencies:
    - prerelease_version
    - prerelease_analyze
  allow_failure: false
  script:
    - source ./scripts/generate_docs/prepare.sh
    - ./scripts/generate_docs/typedocs.sh
    - ./scripts/generate_docs/mkdocs.sh
    - mv target/docs_site internal
  artifacts:
    paths:
      - internal

# --- analyze stage ---

# Run baseline review against previous release
feature_merge_baseline_review:
  extends:
    - .size_medium
    - .retry_on_infra_failure
  interruptible: true
  tags:
    - arch:amd64
  only:
    - merge_requests
  stage: analyze
  dependencies:
    - feature_merge_build_test
  needs:
    - feature_merge_build_test
    - feature_check_target
  cache:
    key: feature-merge-build-$CI_COMMIT_REF_SLUG
    paths:
      - node_modules/
      - packages/**/node_modules/
      - .nx/
    policy: pull
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
    AWS_DEFAULT_REGION: us-east-1
    GIT_DEPTH: '0'
    KIRO_API_KEY: '${KIRO_API_KEY}'
    KIRO_MAX_THREADS: '5'
  script:
    - python3 ./scripts/review/baseline/baseline_review.py --output-dir baseline-review
    - python3 ./scripts/review/baseline/post_baseline_threads.py --report baseline-review/report.json
  artifacts:
    paths:
      - baseline-review/report.json
    reports:
      codequality: baseline-review/codequality-report.json
    when: always

# Auto-populate MR description with change summary and narrative
