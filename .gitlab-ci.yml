    - ./scripts/quality/validate_dependencies.sh --npm-ready
    - ./scripts/publish/test_npm_readiness.sh

# Publish NPM packages to production CodeArtifact repo
release_publish_npm:
  extends: .size_medium
  interruptible: false
  tags:
    - arch:amd64
  environment: release_npm
  except:
    variables:
      - $GITLAB_USER_NAME == "CI_GROUP_TOKEN"
    refs:
      - tags
  only:
    refs:
      - main
  stage: release_publish
  cache:
    key: release-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: pull
  artifacts:
    untracked: false
    paths:
      - package.json
      - lerna.json
      - package-lock.json
      - packages
      - schemas
      - target
      - solution-manifest.yaml
    exclude:
      - '**/node_modules/**'
  dependencies:
    - release_version_package
  needs:
    - release
    - release_version_package
    - prerelease_analyze
    - release_npm_readiness_check # Wait for readiness check
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DELIVERY_ROLE_ARN}'
    AWS_DEFAULT_REGION: us-east-1
  script:
    - RELEASE_VERSION=$(jq -r .version < lerna.json)
    - echo "Deleting existing version $RELEASE_VERSION from CodeArtifact for idempotency"
    - ./scripts/publish/delete_codeartifact_version.sh $RELEASE_VERSION $MDAA_CODEARTIFACT_RELEASE_NPM_REPO $MDAA_CODEARTIFACT_RELEASE_DOMAIN $MDAA_CODEARTIFACT_RELEASE_ACCOUNT $MDAA_CODEARTIFACT_RELEASE_REGION $MDAA_CODEARTIFACT_RELEASE_NAMESPACE || true
    - ./scripts/publish/publish_npm.sh $MDAA_CODEARTIFACT_RELEASE_NPM_REPO $MDAA_CODEARTIFACT_RELEASE_DOMAIN $MDAA_CODEARTIFACT_RELEASE_ACCOUNT latest

