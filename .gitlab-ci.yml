    - python3 ./scripts/review/starter_kit_quality/post_starter_kit_quality_threads.py --report starter-kit-quality-review/report.json
  artifacts:
    paths:
      - starter-kit-quality-review/report.json
    reports:
      codequality: starter-kit-quality-review/codequality-report.json
    when: always

# Scan the target branch (main) to establish the SonarQube baseline so
# that MR changes are correctly classified as "new code".
feature_merge_sonarqube_target:
  extends:
    - .size_xlarge
    - .retry_on_infra_failure
  interruptible: true
  tags:
    - arch:amd64
  only:
    - merge_requests
  stage: prebuild
  dependencies:
    - feature_merge_base_image
  needs:
    - feature_merge_base_image
  cache:
    key: feature-merge-sonar-target-$CI_MERGE_REQUEST_TARGET_BRANCH_NAME
    paths:
      - node_modules/
      - packages/**/node_modules/
      - .nx/
    policy: pull-push
  variables:
    GIT_DEPTH: '0'
    AWS_CREDS_TARGET_ROLE: '${SONAR_ROLE_ARN}'
    AWS_DEFAULT_REGION: us-east-1
  allow_failure: false
  script:
    - ./scripts/quality/sonarqube-target-baseline.sh

# Run SonarQube analysis
feature_merge_sonarqube:
  extends:
    - .size_xlarge
    - .retry_on_infra_failure
  interruptible: true
  tags:
    - arch:amd64
  only:
    - merge_requests
  stage: analyze
  dependencies:
    - feature_merge_build_test
  needs:
    - feature_merge_build_test
    - feature_merge_sonarqube_target
  cache:
    key: feature-merge-build-$CI_COMMIT_REF_SLUG
    paths:
      - node_modules/
      - packages/**/node_modules/
      - .nx/
    policy: pull
  variables:
    GIT_DEPTH: '0'
    AWS_CREDS_TARGET_ROLE: '${SONAR_ROLE_ARN}'
    AWS_DEFAULT_REGION: us-east-1
  allow_failure: false
  script:
    - ./scripts/quality/sonarqube.sh
    # Pre-merge gate: block merge when MERGE_PIPELINE_RUN_ALL=true.
    - |
      if [ "${MERGE_PIPELINE_RUN_ALL}" = "true" ]; then
        echo "============================================================"
        echo "MERGE_PIPELINE_RUN_ALL=true — full-repo analysis completed successfully."
        echo "Failing this gate to prevent merge."
        echo "Set MERGE_PIPELINE_RUN_ALL to 'false' and re-run the pipeline to unblock."
        echo "============================================================"
        exit 1
      fi
      echo "MERGE_PIPELINE_RUN_ALL is not set — merge is allowed."
  artifacts:
    paths:
      - coverage/merged_lcov.info
    expire_in: 7 days
    when: always

# =============================================================================
# Pipeline 2: Feature Branch Pipeline (non-merge feature branches)
# =============================================================================
# Triggered when RUN_FEATURE_PIPELINE=true on non-main, non-tag, non-MR branches.
# Builds, tests, packages, and publishes prerelease artifacts for the feature branch.
# Stage order: base_image -> prebuild -> build -> package -> prerelease_publish
# =============================================================================

# Template: Feature branch pipeline rules (non-merge)
.feature_branch_template:
  interruptible: true
  rules:
    - if: '$RUN_FEATURE_PIPELINE == "true" && $CI_PIPELINE_SOURCE != "merge_request_event" && $CI_COMMIT_BRANCH != "main" && $CI_COMMIT_TAG == null'

# Build the base Docker image for feature branch pipelines
feature_base_image:
  extends:
    - .base_image_template
    - .feature_branch_template

# --- prebuild stage ---

# Version bump and install dependencies
feature_version:
  extends:
    - .feature_branch_template
    - .size_large
  tags:
    - arch:amd64
  stage: prebuild
  cache:
    key: feature-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: push
  artifacts:
    untracked: false
    paths:
      - package.json
      - lerna.json
      - package-lock.json
      - packages
      - target
      - schemas
    exclude:
      - '**/node_modules/**'
      - '.nx/**'
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
    AWS_DEFAULT_REGION: us-east-1
  script:
    - ./scripts/publish/version_prerelease.sh
    - ./scripts/build/npm_install_repo.sh

# --- build stage ---

# Build and run TypeScript/JavaScript tests
feature_build_test:
  extends:
    - .feature_branch_template
    - .size_3xlarge
  tags:
    - arch:amd64
  stage: build
  cache:
    key: feature-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: pull
  dependencies:
    - feature_version
  needs:
    - feature_version
  artifacts:
    untracked: false
    paths:
      - package.json
      - lerna.json
      - package-lock.json
      - packages
      - target
      - schemas
    exclude:
      - '**/node_modules/**'
      - '.nx/**'
  allow_failure: false
  variables:
    NX_RUN_ALL: 'true'
  script:
    - npm run build
    - ./scripts/ci/check_schema_drift.sh
    - npm run test
    # Remove nx daemon log before cache save (~157MB of no CI value)
    - rm -rf .nx/workspace-data/d/

# Run Python tests (after build_test to reuse node_modules cache)
feature_python_test:
  extends:
    - .feature_branch_template
    - .size_large
  stage: test
  tags:
    - arch:amd64
  dependencies:
    - feature_build_test
  needs:
    - feature_build_test
  cache:
    - key: feature-build-$CI_COMMIT_SHA
      paths:
        - node_modules/
        - packages/**/node_modules/
      policy: pull
    - key: feature-python-v2-$CI_COMMIT_SHA
      paths:
        - .uv-cache/
        - '**/python-tests/uv.lock'
      policy: pull-push
  variables:
    UV_CACHE_DIR: ${CI_PROJECT_DIR}/.uv-cache
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: '**/python-tests/coverage.xml'
    paths:
      - '**/python-tests/coverage.xml'
      - '**/python-tests/htmlcov/'
    expire_in: 1 week
  script:
    - echo "Running Python tests with coverage..."
    - npm run test:python

# --- package stage ---

# Package JSII distributions
feature_package:
  extends:
    - .feature_branch_template
    - .size_3xlarge
  tags:
    - arch:amd64
  stage: package
  cache:
    key: feature-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: pull
  artifacts:
    untracked: false
    paths:
      - lerna.json
      - target
      - packages/**/jsii-dist
    exclude:
      - '**/node_modules/**'
  dependencies:
    - feature_build_test
  needs:
    - feature_build_test
  allow_failure: false
  script:
    - ./scripts/build/package_repo.sh

# --- prerelease_publish stage ---

# Publish NPM packages to prerelease CodeArtifact repo
feature_publish_npm:
  extends:
    - .feature_branch_template
    - .size_medium
  tags:
    - arch:amd64
  stage: prerelease_publish
  cache:
    key: feature-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: pull
  dependencies:
    - feature_package
  needs:
    - feature_package
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
    AWS_DEFAULT_REGION: us-east-1
  script:
    - FEATURE_VERSION=$(jq -r .version < lerna.json)
    - echo "Deleting existing version $FEATURE_VERSION from CodeArtifact for idempotency"
    - ./scripts/publish/delete_codeartifact_version.sh $FEATURE_VERSION $MDAA_CODEARTIFACT_PRERELEASE_NPM_REPO $MDAA_CODEARTIFACT_PRERELEASE_DOMAIN $MDAA_CODEARTIFACT_PRERELEASE_ACCOUNT $MDAA_CODEARTIFACT_PRERELEASE_REGION $MDAA_CODEARTIFACT_PRERELEASE_NAMESPACE || true
    - ./scripts/publish/publish_npm.sh $MDAA_CODEARTIFACT_PRERELEASE_NPM_REPO $MDAA_CODEARTIFACT_PRERELEASE_DOMAIN $MDAA_CODEARTIFACT_PRERELEASE_ACCOUNT $CI_COMMIT_REF_SLUG

# Verify published NPM packages are installable
feature_test_published_npm:
  extends:
    - .feature_branch_template
    - .size_3xlarge
  tags:
    - arch:amd64
  stage: prerelease_publish
  cache:
    key: feature-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: pull
  dependencies:
    - feature_package
    - feature_publish_npm
  needs:
    - feature_package
    - feature_publish_npm
  allow_failure: false
  artifacts:
    paths:
      - publish-validation-artifacts/
    when: on_failure
    expire_in: 7 days
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
    AWS_DEFAULT_REGION: us-east-1
  script:
    - SNAPSHOT_VERSION=$(jq -r .version < lerna.json)
    - echo 'Testing published artifacts for version:' $SNAPSHOT_VERSION
    - ./scripts/publish/test_published_artifacts.sh $SNAPSHOT_VERSION $MDAA_CODEARTIFACT_PRERELEASE_NPM_REPO $MDAA_CODEARTIFACT_PRERELEASE_DOMAIN $MDAA_CODEARTIFACT_PRERELEASE_ACCOUNT $CI_COMMIT_REF_SLUG

# Publish Python packages to prerelease CodeArtifact repo
feature_publish_pip:
  extends:
    - .feature_branch_template
    - .size_medium
  tags:
    - arch:amd64
  stage: prerelease_publish
  cache:
    key: feature-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: pull
  dependencies:
    - feature_package
  needs:
    - feature_package
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
    AWS_DEFAULT_REGION: us-east-1
  script:
    - ./scripts/publish/publish_pip.sh $MDAA_CODEARTIFACT_PRERELEASE_PIP_REPO $MDAA_CODEARTIFACT_PRERELEASE_DOMAIN $MDAA_CODEARTIFACT_PRERELEASE_ACCOUNT

# =============================================================================
# Pipeline 3: Prerelease Pipeline (main branch)
# =============================================================================
# Triggered on commits to main (excluding tags). Versions, builds, tests,
# analyzes, packages, and publishes prerelease artifacts.
# Stage order: base_image -> prebuild -> build -> analyze -> package -> prerelease_publish
# =============================================================================

# Build the base Docker image for prerelease pipelines
prerelease_base_image:
  extends: .base_image_template
  only:
    refs:
      - main
  except:
    refs:
      - tags

# --- prebuild stage ---

# Version bump, secret scan, and install dependencies
prerelease_version:
  extends: .size_3xlarge
  tags:
    - arch:amd64
  only:
    refs:
      - main
  except:
    refs:
      - tags
  cache:
    key: prerelease-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: push
  artifacts:
    untracked: false
    paths:
      - package.json
      - lerna.json
      - package-lock.json
      - packages
      - target
      - schemas
    exclude:
      - '**/node_modules/**'
  stage: prebuild
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
    AWS_DEFAULT_REGION: us-east-1
  script:
    - ./scripts/quality/git_secrets.sh
    - ./scripts/publish/version_prerelease.sh
    - ./scripts/build/npm_install_repo.sh

# --- build stage ---

# Build and run TypeScript/JavaScript tests
prerelease_build_test:
  extends: .size_3xlarge
  tags:
    - arch:amd64
  only:
    refs:
      - main
  except:
    refs:
      - tags
  cache:
    key: prerelease-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
      - .nx/
    policy: pull-push
  artifacts:
    untracked: false
    paths:
      - package.json
      - lerna.json
      - package-lock.json
      - packages
      - schemas
      - target
    exclude:
      - '**/node_modules/**'
  stage: build
  dependencies:
    - prerelease_version
  needs:
    - prerelease_version
  allow_failure: false
  script:
    - npm run build
    - ./scripts/ci/check_schema_drift.sh
    - npm run test
    # Remove nx daemon log before cache save (~157MB of no CI value)
    - rm -rf .nx/workspace-data/d/

# --- analyze stage ---

# Run baseline review against previous release
prerelease_baseline_review:
  extends: .size_medium
  tags:
    - arch:amd64
  only:
    refs:
      - main
  except:
    refs:
      - tags
  stage: analyze
  dependencies:
    - prerelease_build_test
  needs:
    - prerelease_build_test
  cache:
    key: prerelease-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: pull
  allow_failure: true
  variables:
    GIT_DEPTH: '0'
  script:
    - python3 ./scripts/review/baseline/baseline_review.py --output-dir baseline-review
  artifacts:
    paths:
      - baseline-review/report.json
    reports:
      codequality: baseline-review/codequality-report.json
    when: always

# Run SonarQube analysis
prerelease_analyze:
  extends: .size_xlarge
  tags:
    - arch:amd64
  only:
    refs:
      - main
  except:
    refs:
      - tags
  cache:
    key: prerelease-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
      - .nx/
    policy: pull
  artifacts:
    untracked: false
    paths:
      - package.json
      - lerna.json
      - package-lock.json
      - packages
      - schemas
      - target
    exclude:
      - '**/node_modules/**'
  stage: analyze
  dependencies:
    - prerelease_build_test
  needs:
    - prerelease_build_test
  variables:
    GIT_DEPTH: '0'
    AWS_CREDS_TARGET_ROLE: '${SONAR_ROLE_ARN}'
    AWS_DEFAULT_REGION: us-east-1
  allow_failure: false
  script:
    - ./scripts/quality/sonarqube.sh

# --- package stage ---

# Package JSII distributions
prerelease_package:
  extends: .size_3xlarge
  tags:
    - arch:amd64
  only:
    refs:
      - main
  except:
    refs:
      - tags
  cache:
    key: prerelease-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
      - .nx/
    policy: pull
  artifacts:
    untracked: false
    paths:
      - package.json
      - lerna.json
      - package-lock.json
      - packages
      - schemas
      - target
    exclude:
      - '**/node_modules/**'
  dependencies:
    - prerelease_build_test
  needs:
    - prerelease_build_test
  stage: package
  allow_failure: false
  script:
    - ./scripts/build/package_repo.sh

# --- prerelease_publish stage ---

# Publish NPM packages to prerelease CodeArtifact repo
prerelease_publish_npm:
  extends: .size_medium
  interruptible: false
  tags:
    - arch:amd64
  environment: prerelease_npm
  only:
    refs:
      - main
  except:
    refs:
      - tags
  stage: prerelease_publish
  cache:
    key: prerelease-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
      - .nx/
    policy: pull
  needs:
    - prerelease_analyze
    - prerelease_package
  dependencies:
    - prerelease_package
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
    AWS_DEFAULT_REGION: us-east-1
  script:
    - PRERELEASE_VERSION=$(jq -r .version < lerna.json)
    - echo "Deleting existing version $PRERELEASE_VERSION from CodeArtifact for idempotency"
    - ./scripts/publish/delete_codeartifact_version.sh $PRERELEASE_VERSION $MDAA_CODEARTIFACT_PRERELEASE_NPM_REPO $MDAA_CODEARTIFACT_PRERELEASE_DOMAIN $MDAA_CODEARTIFACT_PRERELEASE_ACCOUNT $MDAA_CODEARTIFACT_PRERELEASE_REGION $MDAA_CODEARTIFACT_PRERELEASE_NAMESPACE || true
    - ./scripts/publish/publish_npm.sh $MDAA_CODEARTIFACT_PRERELEASE_NPM_REPO $MDAA_CODEARTIFACT_PRERELEASE_DOMAIN $MDAA_CODEARTIFACT_PRERELEASE_ACCOUNT prerelease

# Publish Python packages to prerelease CodeArtifact repo
prerelease_publish_pip:
  extends: .size_medium
  interruptible: false
  tags:
    - arch:amd64
  environment: prerelease_pip
  only:
    refs:
      - main
  except:
    refs:
      - tags
  stage: prerelease_publish
  cache:
    key: prerelease-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
      - .nx/
    policy: pull
  needs:
    - prerelease_analyze
    - prerelease_package
  dependencies:
    - prerelease_package
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
    AWS_DEFAULT_REGION: us-east-1
  script:
    - ./scripts/publish/publish_pip.sh $MDAA_CODEARTIFACT_PRERELEASE_PIP_REPO $MDAA_CODEARTIFACT_PRERELEASE_DOMAIN $MDAA_CODEARTIFACT_PRERELEASE_ACCOUNT

# Publish packaged artifacts to S3
prerelease_publish_s3:
  extends: .size_medium
  interruptible: false
  tags:
    - arch:amd64
  environment: prerelease_s3
  except:
    variables:
      - $GITLAB_USER_NAME == "CI_GROUP_TOKEN"
    refs:
      - tags
  only:
    refs:
      - main
  stage: prerelease_publish
  cache:
    key: prerelease-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
      - .nx/
    policy: pull
  artifacts:
    untracked: false
    paths:
      - package.json
      - lerna.json
      - package-lock.json
      - packages
      - schemas
      - target
    exclude:
      - '**/node_modules/**'
  needs:
    - prerelease_analyze
    - prerelease_package
  dependencies:
    - prerelease_package
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
    AWS_DEFAULT_REGION: us-east-1
  script:
    - ./scripts/publish/publish_s3.sh $MDAA_PRERELEASE_PACKAGE_BUCKET

# =============================================================================
# Pipeline 4: Release Pipeline (main branch, manual trigger)
# =============================================================================
# Manually triggered on main. Versions, builds, tests, packages, and publishes
# release artifacts to production CodeArtifact repos and S3. Includes git push
# and rollback capabilities.
# Stage order: pre_release -> release_publish -> post_release
# =============================================================================

# Build the base Docker image for release pipelines
release_base_image:
  extends: .base_image_template
  except:
    variables:
      - $GITLAB_USER_NAME == "CI_GROUP_TOKEN"
    refs:
      - tags
  only:
    refs:
      - main

# --- pre_release stage ---

# Version, build, test, and package the release (manual trigger)
release_version_package:
  extends: .size_3xlarge
  interruptible: false
  when: manual
  environment: release
  tags:
    - arch:amd64
  except:
    variables:
      - $GITLAB_USER_NAME == "CI_GROUP_TOKEN"
    refs:
      - tags
  only:
    refs:
      - main
  stage: pre_release
  cache:
    key: release-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: push
  artifacts:
    untracked: false
    paths:
      - package.json
      - lerna.json
      - package-lock.json
      - packages
      - target
      - schemas
      - solution-manifest.yaml
      - README.md
      - CHANGELOG.md
    exclude:
      - '**/node_modules/**'
      - '.nx/**'
  allow_failure: false
  needs:
    - prerelease_analyze
  dependencies: []
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
    AWS_DEFAULT_REGION: us-east-1
  script:
    - ./scripts/quality/git_secrets.sh
    - ./scripts/build/npm_install_repo.sh
    - ./scripts/publish/version_release.sh
    - npm run build
    - ./scripts/ci/check_schema_drift.sh
    - npm run test
    # Remove nx daemon log before cache save (~157MB of no CI value)
    - rm -rf .nx/workspace-data/d/
    - ./scripts/build/package_repo.sh

# Manual confirmation gate to proceed with the release
release:
  extends: .size_medium
  interruptible: false
  tags:
    - arch:amd64
  environment: release
  when: manual
  manual_confirmation: 'Are you sure you want to create a $VERSION_BUMP_LEVEL $RELEASE_TYPE version?'
  except:
    variables:
      - $GITLAB_USER_NAME == "CI_GROUP_TOKEN"
    refs:
      - tags
  only:
    refs:
      - main
  stage: pre_release
  dependencies: []
  needs:
    - release_version_package
  allow_failure: false
  script:
    - echo "Releasing "

# --- release_publish stage ---

# Publish NPM packages back to prerelease repo as 'latest'
release_publish_npm_prerelease:
  extends: .size_medium
  interruptible: false
  tags:
    - arch:amd64
  except:
    variables:
      - $GITLAB_USER_NAME == "CI_GROUP_TOKEN"
    refs:
      - tags
  only:
    refs:
      - main
  stage: release_publish
  cache:
    key: release-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: pull
  artifacts:
    untracked: false
    paths:
      - package.json
      - lerna.json
      - package-lock.json
      - packages
      - schemas
      - target
      - solution-manifest.yaml
    exclude:
      - '**/node_modules/**'
  dependencies:
    - release_version_package
  needs:
    - release
    - release_version_package
    - prerelease_analyze
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
    AWS_DEFAULT_REGION: us-east-1
  script:
    - RELEASE_VERSION=$(jq -r .version < lerna.json)
    - echo "Deleting existing version $RELEASE_VERSION from CodeArtifact for idempotency"
    - ./scripts/publish/delete_codeartifact_version.sh $RELEASE_VERSION $MDAA_CODEARTIFACT_PRERELEASE_NPM_REPO $MDAA_CODEARTIFACT_PRERELEASE_DOMAIN $MDAA_CODEARTIFACT_PRERELEASE_ACCOUNT $MDAA_CODEARTIFACT_PRERELEASE_REGION $MDAA_CODEARTIFACT_PRERELEASE_NAMESPACE || true
    - ./scripts/publish/publish_npm.sh $MDAA_CODEARTIFACT_PRERELEASE_NPM_REPO $MDAA_CODEARTIFACT_PRERELEASE_DOMAIN $MDAA_CODEARTIFACT_PRERELEASE_ACCOUNT latest

# Verify published NPM packages pass readiness checks
release_npm_readiness_check:
  extends: .size_3xlarge
  interruptible: false
  tags:
    - arch:amd64
  environment: release_npm
  except:
    variables:
      - $GITLAB_USER_NAME == "CI_GROUP_TOKEN"
    refs:
      - tags
  only:
    refs:
      - main
  stage: release_publish
  cache:
    key: release-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: pull
  dependencies:
    - release_version_package
  needs:
    - release
    - release_version_package
    - prerelease_analyze
    - release_publish_npm_prerelease
  allow_failure: false
  artifacts:
    paths:
      - publish-validation-artifacts/
    when: on_failure
    expire_in: 7 days
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
    AWS_DEFAULT_REGION: us-east-1
  script:
    - RELEASE_VERSION=$(jq -r .version < lerna.json)
    - echo 'Testing NPM readiness for version:' $RELEASE_VERSION
