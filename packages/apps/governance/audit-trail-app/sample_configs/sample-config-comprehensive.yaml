# Comprehensive sample config for the Audit Trail module.
# Covers EVERY non-excluded property from config-schema.json at full depth.
# Deploys multiple CloudTrail trails: one via the legacy 'trail' property and
# additional named trails via 'trails'. Both can coexist in the same config.

# Legacy single-trail configuration (backward-compatible).
# Produces a trail named '{org}-{env}-{domain}-{module}-s3-audit'.
trail:
  # (Required) S3 bucket name where CloudTrail audit logs are stored.
  # Accepts bucket names or SSM parameter references.
  cloudTrailAuditBucketName: ssm:/sample-org/shared/audit/bucket/name
  # (Required) KMS key ARN for encrypting CloudTrail logs written to S3.
  # Accepts key ARNs or SSM parameter references.
  # Direct ARN example: arn:{{partition}}:kms:{{region}}:{{account}}:key/audit-key-id
  cloudTrailAuditKmsKeyArn: ssm:/sample-org/shared/audit/kms/cmk/arn
  # (Optional, boolean) If true, management/control plane events will be
  # included in trail. Otherwise, only S3 Data Events will be included.
  includeManagementEvents: true
  # (Optional) Scoped S3 event selectors. If omitted, all S3 data events
  # in the account are captured. Each entry targets a specific bucket and
  # optional key prefix.
  eventSelectors:
    # Selector targeting a specific bucket and prefix
    - bucketName: ssm:/sample-org/datalake/raw-bucket/name
      # (Optional) S3 key prefix to narrow event capture
      objectPrefix: sensitive-data/
    # Selector targeting an entire bucket (no prefix)
    - bucketName: ssm:/sample-org/datalake/curated-bucket/name

# Named trail configurations for deploying multiple independent trails.
# Each key becomes the trail's resource name segment
# (e.g., '{org}-{env}-{domain}-{module}-analytics-audit').
trails:
  # Trail scoped to analytics workloads
  analytics-audit:
    cloudTrailAuditBucketName: ssm:/sample-org/analytics/audit/bucket/name
    cloudTrailAuditKmsKeyArn: ssm:/sample-org/analytics/audit/kms/cmk/arn
    includeManagementEvents: false
    eventSelectors:
      - bucketName: ssm:/sample-org/analytics/reports-bucket/name
        objectPrefix: daily/
