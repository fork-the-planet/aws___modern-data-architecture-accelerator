# yaml-language-server: $schema=../../../../schemas/@aws-mdaa/dataops-dms.json
# Name of the DataOps Project this DMS task belongs to
projectName: hda-project

# DMS (Database Migration Service) configuration for replicating survey data
dms:
  # Defines one or more replication tasks that move data from source to target
  replicationTasks:
    test-task:
      # Table mappings control which tables are replicated and how they are transformed.
      # See: https://docs.aws.amazon.com/dms/latest/userguide/CHAP_Tasks.CustomizingTasks.TableMapping.html
      tableMappings:
        # Rules are evaluated in order. Selection rules pick which tables to replicate,
        # and transformation rules modify schema/table/column names or add computed columns.
        rules: [
          {
            # "selection" rules define which source tables to include or exclude from replication
            "rule-type": "selection",
            "rule-id": "13",
            "rule-name": "13",
            "object-locator": {
              "schema-name": "survey",
              "table-name": "survey"
            },
            "rule-action": "include"
          },
          {
            "rule-type": "selection",
            "rule-id": "14",
            "rule-name": "14",
            "object-locator": {
              "schema-name": "survey",
              "table-name": "survey_assignment"
            },
            "rule-action": "include"
          },
          {
            "rule-type": "selection",
            "rule-id": "15",
            "rule-name": "15",
            "object-locator": {
              "schema-name": "survey",
              "table-name": "survey_question"
            },
            "rule-action": "include"
          },
          {
            "rule-type": "selection",
            "rule-id": "16",
            "rule-name": "16",
            "object-locator": {
              "schema-name": "survey",
              "table-name": "question"
            },
            "rule-action": "include"
          },
          {
            "rule-type": "selection",
            "rule-id": "17",
            "rule-name": "17",
            "object-locator": {
              "schema-name": "survey",
              "table-name": "survey_response"
            },
            "rule-action": "include"
          },
          {
            "rule-type": "selection",
            "rule-id": "18",
            "rule-name": "18",
            "object-locator": {
              "schema-name": "survey",
              "table-name": "trivia"
            },
            "rule-action": "include"
          },
          {
            "rule-type": "selection",
            "rule-id": "19",
            "rule-name": "19",
            "object-locator": {
              "schema-name": "survey",
              "table-name": "survey_trivia"
            },
            "rule-action": "include"
          },
          {
            # "transformation" rules modify data during replication (rename, add columns, convert case, etc.)
            "rule-type": "transformation",
            "rule-id": "20",
            "rule-name": "cdc timestamp seq",
            # Target of the transformation: "column", "table", "schema", or "table-tablespace"
            "rule-target": "column",
            "object-locator": {
              "schema-name": "%",
              "table-name": "%"
            },
            # "add-column" appends a new computed column to every replicated row
            "rule-action": "add-column",
            "value": "CDC_TIMESTAMP_SEQ",
            # $AR_H_TIMESTAMP is a DMS header variable containing the change timestamp
            "expression": "$AR_H_TIMESTAMP",
            "data-type": {
              "type": "datetime",
              "precision": 6
            }
          },
          {
            "rule-type": "transformation",
            "rule-id": "21",
            "rule-name": "cdc operation",
            "rule-target": "column",
            "object-locator": {
              "schema-name": "%",
              "table-name": "%"
            },
            "rule-action": "add-column",
            "value": "CDC_OPERATION",
            # $AR_H_OPERATION is a DMS header variable containing the CDC operation type (INSERT, UPDATE, DELETE)
            "expression": "$AR_H_OPERATION",
            "data-type": {
              "type": "string",
              "length": 50
            }
          },
          {
            "rule-type": "transformation",
            "rule-id": "22",
            "rule-name": "convert column names to uppercase",
            # "convert-uppercase" normalizes column names for consistent downstream processing
            "rule-action": "convert-uppercase",
            "rule-target": "column",
            "object-locator": {
              "schema-name": "%",
              "table-name": "%",
              "column-name": "%"
            }
          }
        ]
