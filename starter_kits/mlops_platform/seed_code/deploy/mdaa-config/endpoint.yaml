# yaml-language-server: $schema=../../../../../schemas/@aws-mdaa/sagemaker-endpoint.json
# MDAA SageMaker Endpoint Configuration
#
# Deploys a real-time inference endpoint from the latest approved model package.
# Environment variables are resolved at CDK synth time via {{env_var:...}}.

# Project name — used in resource naming (endpoint, model, KMS key)
projectName: "{{env_var:PROJECT_NAME}}"

# Model Package ARN — the specific model version to deploy.
# Resolved in the buildspec by querying the model registry for the latest approved version.
modelPackageArn: "{{env_var:MODEL_PACKAGE_ARN}}"

# Stage name — differentiates resources across dev/preprod/prod (e.g., endpoint name suffix).
# Set by the CodePipeline stage's DEPLOY_STAGE env var.
stageName: "{{env_var:DEPLOY_STAGE}}"

# S3 bucket containing model artifacts (output from the training pipeline).
# The endpoint role is granted read access to this bucket.
modelBucketName: "{{env_var:PIPELINE_BUCKET_NAME}}"

# KMS key ARN for decrypting model artifacts from the training pipeline's bucket.
# Required for cross-stack access when the endpoint is in a different stack than the training pipeline.
modelArtifactKmsKeyArn: "{{env_var:PIPELINE_KMS_ARN}}"

# Instance configuration for the real-time endpoint
productionVariant:
  instanceType: ml.m5.large
  instanceCount: 1

# VPC configuration — runs the endpoint inside your VPC for network isolation.
# Requires VPC endpoints for S3, SageMaker, and CloudWatch.
# STAGE_SUBNET_IDS and STAGE_SECURITY_GROUP_IDS are set by the buildspec
# based on DEPLOY_STAGE (dev/preprod/prod), selecting the correct account's VPC.
networkConfig:
  subnetIds: "{{env_var:STAGE_SUBNET_IDS}}"
  securityGroupIds: "{{env_var:STAGE_SECURITY_GROUP_IDS}}"
  enableNetworkIsolation: "{{env_var:ENABLE_NETWORK_ISOLATION}}"

# Data capture — records endpoint request/response payloads to S3.
# Required for model monitoring: the monitoring schedule reads captured data
# to detect model quality degradation and data drift.
dataCaptureConfig:
  enableCapture: true
  samplingPercentage: 100
  csvContentTypes:
    - "text/csv"
