# yaml-language-server: $schema=../../../../../schemas/@aws-mdaa/sagemaker-model-monitoring.json
# MDAA SageMaker Model Monitoring Configuration
#
# Creates a model quality monitoring schedule that runs hourly against the deployed endpoint.
# Detects model quality degradation by comparing predictions against ground truth data.

# Endpoint name — resolved in the buildspec from SSM after the endpoint stack deploys.
endpointName: "{{env_var:ENDPOINT_NAME}}"

# S3 bucket ARN for model artifacts and monitoring output (partition-aware).
modelBucketArn: "{{env_var:PIPELINE_BUCKET_ARN}}"

# VPC configuration — monitoring jobs run inside your VPC for network isolation.
# Uses the same VPC as the endpoint to ensure the monitoring job can reach it.
# STAGE_* env vars are set by the buildspec based on DEPLOY_STAGE (dev/preprod/prod).
vpcId: "{{env_var:STAGE_VPC_ID}}"
subnetIds: "{{env_var:STAGE_SUBNET_IDS}}"
securityGroupIds: "{{env_var:STAGE_SECURITY_GROUP_IDS}}"
networkIsolation: "{{env_var:ENABLE_NETWORK_ISOLATION}}"

monitors:
  # Model quality monitor — detects degradation in model prediction accuracy.
  # Compares endpoint predictions (from data capture) against ground truth labels.
  # Ground truth data must be uploaded to the specified S3 path by your evaluation pipeline.
  modelQuality:
    enabled: true
    problemType: Regression
    groundTruthS3Uri: "s3://{{env_var:PIPELINE_BUCKET_NAME}}/ground-truth/"
    schedule: "cron(0 * ? * * *)"
    instanceType: ml.m5.large
    # SageMaker Model Monitor pre-built container image.
    # The ECR registry account is resolved at runtime by the buildspec via SageMaker Python SDK.
    imageUri: "{{env_var:SAGEMAKER_MONITOR_REGISTRY}}.dkr.ecr.{{env_var:AWS_REGION}}.amazonaws.com/sagemaker-model-monitor-analyzer"
