# yaml-language-server: $schema=../../../schemas/@aws-mdaa/dataops-data-quality.json
# Data Quality configuration for validating data in the sample database
# This references the project created in project.yaml

projectName: example-project

rulesets:
  sample-data-quality:
    description: Validate sample data completeness and row count
    targetTable:
      databaseName: project:databaseName/sample-database
      tableName: sample_data
    ruleset:
      - ruleType: RowCount
        comparisonOperator: ">"
        value: 0
      - ruleType: IsComplete
        column: id
