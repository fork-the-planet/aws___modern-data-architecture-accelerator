# For source control management
# SCM is enabled so SonarQube can use git blame data to accurately
# determine new code (code changed since the new code period baseline).
# Ensure GIT_DEPTH=0 (full clone) in CI for this to work correctly.
sonar.scm.disabled=false

# Encoding of the source files
sonar.sourceEncoding=UTF-8

# Path is relative to the sonar-project.properties file. Defaults to .
sonar.sources=packages

# Within the directories defined by sonar.tests, subset of files that will be considered as tests
sonar.test.inclusions=**/*.test.ts

# Exclude following files from Sonarqube reporting
sonar.exclusions= \
    **.d.ts, \
    **.js, \
    **/test/**, \
    **.py, \
    **/bin/**, \
    **/cdk8s/**, \
    **/node_modules/**, \
    **/package.json, \
    **/package-lock.json, \
    **/tsconfig.json, \
    **/jest.config.js, \
    **/.eslintrc.json

# Exclude following files from Sonarqube coverage reporting.
# starter-kit-synth-setup.ts is loaded only via NODE_OPTIONS=--require in
# spawned CDK subprocesses, never imported by a unit test, so no coverage is
# reported for it; its logic is covered via starter-kit-synth-stubs.ts.
sonar.coverage.exclusions = \
    **/test/**, \
    **/bin/**, \
    **/starter-kit-synth-setup.ts, \
    **/cdk8s/**

sonar.inclusions = packages/**/lib/**/*.ts

sonar.cpd.exclusions = packages/cli/lib/mdaa.ts

# Exclude rules
sonar.issue.ignore.multicriteria=e1,e2

# Ignores unused constructor nag
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S1848
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.ts

# Ignores "replaceAll instead of replace" nag (requires ES2022)
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S7781
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.ts